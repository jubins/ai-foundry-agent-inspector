name: build

on:
  pull_request:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Bundle (desktop)
        run: npm run bundle

      - name: Bundle (web)
        run: npm run bundle:web

      - name: Package .vsix
        run: npx vsce package --no-dependencies
