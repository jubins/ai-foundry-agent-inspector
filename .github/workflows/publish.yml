name: Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version bump (patch / minor / major)"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

# Restrict to master only and grant write access for pushing the version tag
permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run bundle && npm run bundle:web

      - name: Bump version
        # Use an environment variable to avoid shell injection from workflow input
        env:
          VERSION_BUMP: ${{ github.event.inputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm version "$VERSION_BUMP" -m "chore: bump version to %s"

      - name: Push version commit and tag
        run: git push --follow-tags

      - name: Publish to VS Code Marketplace
        run: npx vsce publish --no-dependencies
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT_JS }}
